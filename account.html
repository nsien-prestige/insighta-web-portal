<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account — Insighta Labs</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo">⚡ Insighta</div>
            <nav>
                <a href="dashboard.html">📊 Dashboard</a>
                <a href="profiles.html">👥 Profiles</a>
                <a href="search.html">🔍 Search</a>
                <a href="account.html" class="active">👤 Account</a>
            </nav>
            <div class="user-info">
                <div class="username" id="sidebar-username">Loading...</div>
                <div class="role" id="sidebar-role"></div>
                <button class="btn-logout" onclick="handleLogout()">Sign out</button>
            </div>
        </aside>

        <main class="main">
            <div class="page-header">
                <h1>Account</h1>
                <p>Your profile and account details</p>
            </div>

            <div id="account-container">
                <div class="loading"><div class="spinner"></div><p>Loading...</p></div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        const API_URL = 'https://insighta-backend-zph3.onrender.com'

        const init = async () => {
            const user = await checkAuth()
            if (!user) return

            document.getElementById('sidebar-username').textContent = '@' + user.username
            document.getElementById('sidebar-role').textContent = user.role

            document.getElementById('account-container').innerHTML = `
                <div class="card">
                    <div style="display:flex; align-items:center; gap:16px; margin-bottom:24px;">
                        <img 
                            src="${user.avatar_url || 'https://github.com/identicons/' + user.username + '.png'}" 
                            class="avatar" 
                            alt="Avatar"
                            onerror="this.src='https://github.com/identicons/${user.username}.png'"
                        >
                        <div>
                            <h2 style="font-size:20px;">@${user.username}</h2>
                            <span class="badge badge-${user.role}">${user.role}</span>
                        </div>
                    </div>

                    <div class="account-grid">
                        <div class="detail-item">
                            <div class="label">Username</div>
                            <div class="value">@${user.username}</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">Email</div>
                            <div class="value">${user.email || 'Not provided'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">Role</div>
                            <div class="value">
                                <span class="badge badge-${user.role}">${user.role}</span>
                            </div>
                        </div>
                        <div class="detail-item">
                            <div class="label">Member Since</div>
                            <div class="value">${formatDate(user.created_at)}</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">Last Login</div>
                            <div class="value">${formatDate(user.last_login_at)}</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">User ID</div>
                            <div class="value" style="font-size:12px; color:var(--text-light)">${user.id}</div>
                        </div>
                    </div>

                    <div style="margin-top:24px; padding-top:24px; border-top:1px solid var(--border);">
                        <button class="btn btn-primary" style="background:#ef4444;" onclick="handleLogout()">
                            Sign Out
                        </button>
                    </div>
                </div>
            `
        }

        const handleLogout = async () => await logout()

        init()
    </script>
</body>
</html>
