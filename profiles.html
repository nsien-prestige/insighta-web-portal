<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profiles — Insighta Labs</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo">⚡ Insighta</div>
            <nav>
                <a href="dashboard.html">📊 Dashboard</a>
                <a href="profiles.html" class="active">👥 Profiles</a>
                <a href="search.html">🔍 Search</a>
                <a href="account.html">👤 Account</a>
            </nav>
            <div class="user-info">
                <div class="username" id="sidebar-username">Loading...</div>
                <div class="role" id="sidebar-role"></div>
                <button class="btn-logout" onclick="handleLogout()">Sign out</button>
            </div>
        </aside>

        <main class="main">
            <div class="page-header">
                <h1>Profiles</h1>
                <p>Browse and filter all profiles</p>
            </div>

            <!-- Filters -->
            <div class="filters">
                <select id="filter-gender">
                    <option value="">All Genders</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
                <select id="filter-age-group">
                    <option value="">All Age Groups</option>
                    <option value="child">Child</option>
                    <option value="teenager">Teenager</option>
                    <option value="adult">Adult</option>
                    <option value="senior">Senior</option>
                </select>
                <input type="text" id="filter-country" placeholder="Country code (e.g NG)">
                <input type="number" id="filter-min-age" placeholder="Min age">
                <input type="number" id="filter-max-age" placeholder="Max age">
                <select id="filter-sort">
                    <option value="created_at">Sort by Date</option>
                    <option value="age">Sort by Age</option>
                    <option value="gender_probability">Sort by Gender Probability</option>
                </select>
                <select id="filter-order">
                    <option value="asc">Ascending</option>
                    <option value="desc">Descending</option>
                </select>
                <button class="btn btn-primary" onclick="loadProfiles(1)">Apply</button>
                <button class="btn btn-secondary" onclick="resetFilters()">Reset</button>
                <button class="btn btn-primary" id="export-btn" onclick="exportCSV()">Export CSV</button>
                <button class="btn btn-primary" id="create-btn" onclick="showCreateModal()" style="display:none">+ Create</button>
            </div>

            <!-- Table -->
            <div class="table-container">
                <div id="profiles-container">
                    <div class="loading"><div class="spinner"></div><p>Loading...</p></div>
                </div>
                <div class="pagination" id="pagination" style="display:none">
                    <span id="pagination-info"></span>
                    <div class="pagination-buttons">
                        <button id="prev-btn" onclick="changePage(-1)" disabled>← Prev</button>
                        <button id="next-btn" onclick="changePage(1)">Next →</button>
                    </div>
                </div>
            </div>

            <!-- Create Modal -->
            <div id="create-modal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:100; align-items:center; justify-content:center;">
                <div class="card" style="width:400px;">
                    <h2 style="margin-bottom:16px;">Create Profile</h2>
                    <input type="text" id="create-name" placeholder="Enter name" style="width:100%; padding:10px; border:1px solid #e2e8f0; border-radius:6px; margin-bottom:16px; font-size:14px;">
                    <div style="display:flex; gap:8px;">
                        <button class="btn btn-primary" onclick="createProfile()">Create</button>
                        <button class="btn btn-secondary" onclick="hideCreateModal()">Cancel</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        const API_URL = 'https://insighta-backend-zph3.onrender.com'
        let currentPage = 1
        let totalPages = 1
        let currentUser = null

        const init = async () => {
            currentUser = await checkAuth()
            if (!currentUser) return

            document.getElementById('sidebar-username').textContent = '@' + currentUser.username
            document.getElementById('sidebar-role').textContent = currentUser.role

            if (currentUser.role === 'admin') {
                document.getElementById('create-btn').style.display = 'block'
            }

            loadProfiles(1)
        }

        const getFilters = () => {
            return {
                gender: document.getElementById('filter-gender').value,
                age_group: document.getElementById('filter-age-group').value,
                country_id: document.getElementById('filter-country').value,
                min_age: document.getElementById('filter-min-age').value,
                max_age: document.getElementById('filter-max-age').value,
                sort_by: document.getElementById('filter-sort').value,
                order: document.getElementById('filter-order').value,
            }
        }

        const loadProfiles = async (page) => {
            currentPage = page
            const container = document.getElementById('profiles-container')
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading...</p></div>'

            try {
                const filters = getFilters()
                const params = buildQueryString({ ...filters, page, limit: 10 })
                const response = await api.get(`/api/profiles?${params}`)
                const data = await response.json()

                totalPages = data.total_pages

                container.innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Gender</th>
                                <th>Age</th>
                                <th>Age Group</th>
                                <th>Country</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.data.map(p => `
                                <tr>
                                    <td><a href="profile.html?id=${p.id}">${p.name}</a></td>
                                    <td><span class="badge badge-${p.gender}">${p.gender}</span></td>
                                    <td>${p.age}</td>
                                    <td>${p.age_group}</td>
                                    <td>${p.country_id}</td>
                                    <td><a href="profile.html?id=${p.id}">View</a></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `

                document.getElementById('pagination').style.display = 'flex'
                document.getElementById('pagination-info').textContent = 
                    `Page ${data.page} of ${data.total_pages} — ${data.total.toLocaleString()} profiles`
                document.getElementById('prev-btn').disabled = page <= 1
                document.getElementById('next-btn').disabled = page >= totalPages

            } catch (err) {
                container.innerHTML = '<div class="error-message">Failed to load profiles</div>'
            }
        }

        const changePage = (direction) => {
            loadProfiles(currentPage + direction)
        }

        const resetFilters = () => {
            document.getElementById('filter-gender').value = ''
            document.getElementById('filter-age-group').value = ''
            document.getElementById('filter-country').value = ''
            document.getElementById('filter-min-age').value = ''
            document.getElementById('filter-max-age').value = ''
            loadProfiles(1)
        }

        const exportCSV = async () => {
            const filters = getFilters()
            const params = buildQueryString(filters)
            
            try {
                const response = await api.get(`/api/profiles/export?${params}&format=csv`)
                const blob = await response.blob()
                const url = window.URL.createObjectURL(blob)
                const a = document.createElement('a')
                a.href = url
                a.download = `profiles_${Date.now()}.csv`
                a.click()
                window.URL.revokeObjectURL(url)
            } catch (err) {
                alert('Export failed')
            }
        }

        const showCreateModal = () => {
            document.getElementById('create-modal').style.display = 'flex'
        }

        const hideCreateModal = () => {
            document.getElementById('create-modal').style.display = 'none'
        }

        const createProfile = async () => {
            const name = document.getElementById('create-name').value.trim()
            if (!name) return alert('Name is required')

            try {
                const response = await api.post('/api/profiles', { name })
                const data = await response.json()
                if (data.status === 'success') {
                    hideCreateModal()
                    loadProfiles(currentPage)
                } else {
                    alert(data.message)
                }
            } catch (err) {
                alert('Failed to create profile')
            }
        }

        const handleLogout = async () => await logout()

        init()
    </script>
</body>
</html>
