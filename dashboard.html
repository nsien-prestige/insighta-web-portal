<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Insighta Labs</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">⚡ Insighta</div>
            <nav>
                <a href="dashboard.html" class="active">📊 Dashboard</a>
                <a href="profiles.html">👥 Profiles</a>
                <a href="search.html">🔍 Search</a>
                <a href="account.html">👤 Account</a>
            </nav>
            <div class="user-info">
                <div class="username" id="sidebar-username">Loading...</div>
                <div class="role" id="sidebar-role"></div>
                <button class="btn-logout" onclick="handleLogout()">Sign out</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main">
            <div class="page-header">
                <h1>Dashboard</h1>
                <p>Welcome back! Here's an overview of your data.</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="total-profiles">—</div>
                    <div class="stat-label">Total Profiles</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-male">—</div>
                    <div class="stat-label">Male Profiles</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-female">—</div>
                    <div class="stat-label">Female Profiles</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-countries">—</div>
                    <div class="stat-label">Countries</div>
                </div>
            </div>

            <div class="card">
                <h2 style="margin-bottom: 16px; font-size: 16px;">Recent Profiles</h2>
                <div id="recent-profiles">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Loading...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        const API_URL = 'https://insightabackend.hostless.app'

        const init = async () => {
            const user = await checkAuth()
            if (!user) return

            document.getElementById('sidebar-username').textContent = '@' + user.username
            document.getElementById('sidebar-role').textContent = user.role

            loadStats()
            loadRecentProfiles()
        }

        const loadStats = async () => {
            try {
                const response = await api.get('/api/profiles?limit=1')
                const data = await response.json()
                document.getElementById('total-profiles').textContent = data.total.toLocaleString()

                const maleRes = await api.get('/api/profiles?gender=male&limit=1')
                const maleData = await maleRes.json()
                document.getElementById('total-male').textContent = maleData.total.toLocaleString()

                const femaleRes = await api.get('/api/profiles?gender=female&limit=1')
                const femaleData = await femaleRes.json()
                document.getElementById('total-female').textContent = femaleData.total.toLocaleString()

            } catch (err) {
                console.error(err)
            }
        }

        const loadRecentProfiles = async () => {
            try {
                const response = await api.get('/api/profiles?limit=5&sort_by=created_at&order=desc')
                const data = await response.json()

                const container = document.getElementById('recent-profiles')
                container.innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Gender</th>
                                <th>Age</th>
                                <th>Country</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.data.map(p => `
                                <tr>
                                    <td><a href="profile.html?id=${p.id}">${p.name}</a></td>
                                    <td><span class="badge badge-${p.gender}">${p.gender}</span></td>
                                    <td>${p.age}</td>
                                    <td>${p.country_id}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `
            } catch (err) {
                document.getElementById('recent-profiles').innerHTML = 
                    '<div class="error-message">Failed to load profiles</div>'
            }
        }

        const handleLogout = async () => {
            await logout()
        }

        init()
    </script>
</body>
</html>
